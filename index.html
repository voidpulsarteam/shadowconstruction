<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Construction — Fleet Livery Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #080810;
  --surface: #0e0e1a;
  --card: #11111f;
  --card-hover: #161628;
  --border: #1e1e35;
  --border-bright: #2e2e55;
  --accent: #7B3FE4;
  --accent2: #B56CFF;
  --accent3: #4f22a8;
  --glow: rgba(123,63,228,0.18);
  --glow2: rgba(181,108,255,0.12);
  --text: #e8e8f8;
  --muted: #5a5a80;
  --muted2: #3a3a60;
  --cyan: #64d8ff;
  --cyan-dim: rgba(100,216,255,0.15);
  --green: #4dffc8;
  --green-dim: rgba(77,255,200,0.12);
  --amber: #ffb347;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === NOISE OVERLAY === */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:0.6;
}

/* === BACKGROUND GRID === */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(123,63,228,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,63,228,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events:none;
  z-index:0;
}

/* === HEADER === */
.header {
  position: relative;
  z-index: 10;
  padding: 0 56px;
  border-bottom: 1px solid var(--border-bright);
  background: linear-gradient(180deg, rgba(123,63,228,0.08) 0%, transparent 100%);
}

.header-inner {
  display: flex;
  align-items: center;
  gap: 40px;
  padding: 36px 0 32px;
}

.logo-wrap {
  flex-shrink: 0;
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.logo-wrap::before {
  content:'';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(123,63,228,0.25) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:0.6; transform:scale(1); }
  50% { opacity:1; transform:scale(1.06); }
}

.logo-wrap img {
  width: 90px;
  height: 90px;
  object-fit: contain;
  position: relative;
  z-index:1;
  filter: drop-shadow(0 0 18px rgba(181,108,255,0.5));
}

.header-text {
  flex:1;
}

.header-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--accent2);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.8;
}

.header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 42px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: 2px;
  color: white;
}

.header-title .hi {
  background: linear-gradient(135deg, #7B3FE4 0%, #B56CFF 50%, #64d8ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-subtitle {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 8px;
  font-weight: 400;
}

.header-stats {
  display: flex;
  gap: 0;
  flex-shrink: 0;
}

.stat-block {
  padding: 12px 24px;
  border-left: 1px solid var(--border);
  text-align: center;
}

.stat-block:first-child { border-left: none; }

.stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
}

.stat-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* Accent bar at bottom of header */
.header-bar {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--cyan), transparent);
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
}

/* === CONTENT === */
.content {
  position: relative;
  z-index: 5;
  padding: 48px 56px;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.section-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--accent2);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.section-line {
  flex:1;
  height: 1px;
  background: linear-gradient(90deg, var(--border-bright), transparent);
}

/* === VEHICLE GRID === */
.vehicles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 1px;
  background: var(--border);
}

/* === VEHICLE CARD === */
.vehicle-card {
  background: var(--card);
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
}

.vehicle-card:hover {
  background: var(--card-hover);
}

/* Top accent line */
.vehicle-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.vehicle-card:hover::before {
  transform: scaleX(1);
}

/* BG glow */
.vehicle-card::after {
  content:'';
  position:absolute;
  top:-60px; left:-40px;
  width:200px; height:200px;
  background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
  opacity:0;
  transition: opacity 0.3s;
  pointer-events:none;
}

.vehicle-card:hover::after {
  opacity:1;
}

.card-num {
  position: absolute;
  right: 14px;
  top: 10px;
  font-family: 'Orbitron', sans-serif;
  font-size: 38px;
  font-weight: 900;
  color: rgba(255,255,255,0.03);
  pointer-events:none;
  line-height:1;
}

/* Card header */
.card-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index:2;
}

.vehicle-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  color: white;
  line-height: 1.3;
  padding-right: 40px;
}

.vehicle-meta {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  align-items:center;
}

.meta-pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 2px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.meta-pill.year {
  background: rgba(123,63,228,0.2);
  color: var(--accent2);
  border: 1px solid rgba(123,63,228,0.3);
}

.meta-pill.variant {
  background: rgba(100,216,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(100,216,255,0.2);
}

/* Livery table */
.card-body {
  padding: 12px 20px 14px;
  position: relative;
  z-index:2;
}

.livery-table {
  width: 100%;
  border-collapse: collapse;
}

.livery-table tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.livery-table tr:last-child {
  border-bottom: none;
}

.livery-table td {
  padding: 5px 0;
  vertical-align: middle;
}

.slot-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  padding: 3px 7px;
  border-radius: 2px;
  letter-spacing: 1px;
  white-space: nowrap;
  display: inline-block;
  min-width: 58px;
  text-align: center;
  text-transform: uppercase;
}

.slot-badge.left {
  color: var(--accent2);
  background: rgba(123,63,228,0.12);
  border: 1px solid rgba(123,63,228,0.25);
}

.slot-badge.right {
  color: var(--cyan);
  background: var(--cyan-dim);
  border: 1px solid rgba(100,216,255,0.2);
}

.slot-badge.back {
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid rgba(77,255,200,0.2);
}

.livery-id {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  padding-left: 12px;
  letter-spacing: 0.5px;
  cursor: text;
  user-select: all;
  transition: color 0.15s;
}

.livery-table tr:hover .livery-id {
  color: var(--text);
}

/* Color footer */
.card-colors {
  padding: 10px 20px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  position: relative;
  z-index:2;
}

.color-chip {
  display: flex;
  align-items: center;
  gap: 8px;
}

.chip-swatch {
  width: 20px;
  height: 20px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.1);
  flex-shrink:0;
}

.chip-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  display:block;
  line-height:1.2;
}

.chip-value {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #999;
  display:block;
  line-height:1.2;
}

/* === FOOTER === */
.footer {
  position: relative;
  z-index:5;
  border-top: 1px solid var(--border);
  padding: 24px 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.3);
}

.footer-left {
  display:flex;
  align-items:center;
  gap:16px;
}

.footer-logo {
  width:32px;
  height:32px;
  object-fit:contain;
  opacity:0.7;
  filter: drop-shadow(0 0 6px rgba(181,108,255,0.4));
}

.footer-brand {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
}

.footer-brand span { color: var(--accent2); }

.footer-info {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted2);
  letter-spacing: 1px;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--accent3); border-radius:3px; }

/* === FADE IN === */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.vehicle-card {
  animation: fadeUp 0.4s ease both;
}

/* === MOBILE === */
@media(max-width:768px) {
  .header { padding: 0 20px; }
  .header-inner { flex-wrap:wrap; gap:20px; padding:24px 0 20px; }
  .header-stats { flex-wrap:wrap; }
  .stat-block { padding:8px 16px; }
  .header-title { font-size:28px; }
  .content { padding:24px 20px; }
  .vehicles-grid { grid-template-columns:1fr; }
  .footer { padding:16px 20px; flex-direction:column; gap:10px; text-align:center; }
}

</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-wrap">
      <img src="https://i.imgur.com/BCwBi9G.png" alt="Shadow Construction Logo" onerror="this.style.display='none'">
    </div>

    <div class="header-text">
      <div class="header-eyebrow">// Internal Reference Doc</div>
      <div class="header-title">SHADOW <span class="hi">CONSTRUCTION</span></div>
      <div class="header-subtitle">Fleet Livery Reference Sheet — All Vehicles</div>
    </div>

    <div class="header-stats">
      <div class="stat-block">
        <div class="stat-num" id="statVehicles">13</div>
        <div class="stat-label">Vehicles</div>
      </div>
      <div class="stat-block">
        <div class="stat-num" id="statSlots">—</div>
        <div class="stat-label">Livery Slots</div>
      </div>
    </div>
  </div>
  <div class="header-bar"></div>
</header>

<main class="content">
  <div class="section-header">
    <div class="section-tag">// Vehicle Fleet</div>
    <div class="section-line"></div>
  </div>
  <div class="vehicles-grid" id="vehicleGrid"></div>
</main>

<footer class="footer">
  <div class="footer-left">
    <img class="footer-logo" src="https://i.imgur.com/BCwBi9G.png" alt="" onerror="this.style.display='none'">
    <div class="footer-brand">SHADOW <span>CONSTRUCTION</span></div>
  </div>
  <div class="footer-info" id="footerInfo"></div>
</footer>

<script>
const vehicles = [
  {
    name: "Vinnimade Heavy Wrecker",
    year: "2013",
    liveries: [
      { slot: "Left1",  id: "91611251322036" },
      { slot: "Left2",  id: "114714965982575" },
      { slot: "Right1", id: "79787851507951" },
      { slot: "Right2", id: "102539066133658" },
      { slot: "Back1",  id: "119186687455237" },
    ],
    colors: [{ role: "Primary", hex: "#000000" }, { role: "Secondary", hex: "#303030" }]
  },
  {
    name: "Vellfire Evertt Crew Cab",
    year: "1995",
    liveries: [
      { slot: "Left1",  id: "80463032289176" },
      { slot: "Left2",  id: "95795601417311" },
      { slot: "Right1", id: "122026534931254" },
      { slot: "Right2", id: "71872514729530" },
      { slot: "Back2",  id: "89973063768798" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }, { role: "Secondary", hex: "#303030" }]
  },
  {
    name: "Falcon Advance 350 Roadside Assist.",
    year: "",
    liveries: [
      { slot: "Left1",  id: "139620585977155" },
      { slot: "Right1", id: "122026534931254" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Falcon Advance 450 Tow Truck",
    year: "2020",
    variant: "Variant A",
    liveries: [
      { slot: "Left1",  id: "123996060661117" },
      { slot: "Left2",  id: "87113158850025" },
      { slot: "Right1", id: "87832857139587" },
      { slot: "Right2", id: "103416941661628" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Falcon Advance 450 Bucket Truck",
    year: "2020",
    variant: "Variant B",
    liveries: [
      { slot: "Left1",  id: "123996060661117" },
      { slot: "Left2",  id: "74939274918977" },
      { slot: "Right1", id: "87832857139587" },
      { slot: "Right2", id: "83524575163937" },
      { slot: "Back2",  id: "76933503172017" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Falcon Global 450 Utility",
    year: "2018",
    liveries: [
      { slot: "Left1",  id: "85117952096868" },
      { slot: "Left2",  id: "127341970278960" },
      { slot: "Left5",  id: "114867966853337" },
      { slot: "Right1", id: "99458832743161" },
      { slot: "Right2", id: "77506526605034" },
      { slot: "Right5", id: "114867966853337" },
      { slot: "Back2",  id: "84222262162183" },
      { slot: "Back3",  id: "126679458438853" },
      { slot: "Back4",  id: "73214191051547" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Falcon Advance 450",
    year: "2020",
    liveries: [
      { slot: "Left1",  id: "90460516727264" },
      { slot: "Left2",  id: "130085568743320" },
      { slot: "Right1", id: "78684134302194" },
      { slot: "Right2", id: "139968376171923" },
      { slot: "Back3",  id: "88843174838303" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Falcon Advance 350",
    year: "2020",
    liveries: [
      { slot: "Left1",  id: "100831650235705" },
      { slot: "Right1", id: "97346005997027" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Explorer Transport Truck",
    year: "2015",
    liveries: [
      { slot: "Left1",  id: "131136646774388" },
      { slot: "Right1", id: "127504752991195" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Explorer Salt Truck",
    year: "2015",
    liveries: [
      { slot: "Left1",  id: "131136646774388" },
      { slot: "Right1", id: "127504752991195" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Explorer Tow Truck",
    year: "2015",
    liveries: [
      { slot: "Left1",  id: "131136646774388" },
      { slot: "Right1", id: "127504752991195" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Chevlon L/35 Flatbed Tow Truck",
    year: "1981",
    liveries: [
      { slot: "Left1",  id: "71071306586755" },
      { slot: "Right1", id: "76466226064814" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
  {
    name: "Street Sweeper",
    year: "",
    liveries: [
      { slot: "Left2",  id: "94735715806411" },
      { slot: "Right2", id: "117556936437242" },
    ],
    colors: [{ role: "Primary", hex: "#020101" }]
  },
];

function slotClass(slot) {
  if (slot.startsWith("Left"))  return "left";
  if (slot.startsWith("Right")) return "right";
  if (slot.startsWith("Back"))  return "back";
  return "left";
}

const grid = document.getElementById("vehicleGrid");
let totalSlots = 0;

vehicles.forEach((v, i) => {
  totalSlots += v.liveries.length;

  const card = document.createElement("div");
  card.className = "vehicle-card";
  card.style.animationDelay = `${i * 0.04}s`;

  const metaPills = [];
  if (v.year) metaPills.push(`<span class="meta-pill year">${v.year}</span>`);
  if (v.variant) metaPills.push(`<span class="meta-pill variant">${v.variant}</span>`);

  const rows = v.liveries.map(l => `
    <tr>
      <td><span class="slot-badge ${slotClass(l.slot)}">${l.slot}</span></td>
      <td><span class="livery-id">${l.id}</span></td>
    </tr>`).join('');

  const colors = v.colors.map(c => `
    <div class="color-chip">
      <div class="chip-swatch" style="background:${c.hex}"></div>
      <div>
        <span class="chip-label">${c.role}</span>
        <span class="chip-value">${c.hex.toUpperCase()}</span>
      </div>
    </div>`).join('');

  card.innerHTML = `
    <div class="card-num">${String(i+1).padStart(2,'0')}</div>
    <div class="card-head">
      <div class="vehicle-name">${v.name}</div>
      ${metaPills.length ? `<div class="vehicle-meta">${metaPills.join('')}</div>` : ''}
    </div>
    <div class="card-body">
      <table class="livery-table"><tbody>${rows}</tbody></table>
    </div>
    <div class="card-colors">${colors}</div>
  `;

  grid.appendChild(card);
});

document.getElementById("statVehicles").textContent = vehicles.length;
document.getElementById("statSlots").textContent = totalSlots;
document.getElementById("footerInfo").textContent =
  `${vehicles.length} vehicles · ${totalSlots} livery slots · internal use only`;
</script>
</body>
</html>
